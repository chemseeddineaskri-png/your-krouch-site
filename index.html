<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>موقع الهامستر العجيب</title>
    <style>
        body {
            background-color: #2c3e50; /* لون خلفية غامق ومريح */
            color: white;
            text-align: center;
            font-family: Arial, sans-serif;
            padding-top: 50px;
        }
        h1 {
            color: #f1c40f; /* اللون الأصفر الذي تحبه */
        }
        .my-image {
            border: 5px solid #f1c40f; /* إطار أصفر حول الصورة */
            border-radius: 15px; /* زوايا دائرية */
            box-shadow: 0px 4px 15px rgba(0,0,0,0.5); /* ظل لإعطاء عمق */
        }
    </style>
</head>
<body>

    <h1>مرحباً بكم في موقعي الطريف!</h1>
    <p>انظروا إلى هذه الصورة العجيبة التي أضفتها:</p>
    <br>

    <img src="https://upload.wikimedia.org/wikipedia/commons/d/de/Hamster_01.jpg" alt="هامستر" width="400" class="my-image">
    

</body>
</html>
